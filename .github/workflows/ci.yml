name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Start TuringDB
        run: |
          docker run -d --name turingdb -p 6670:6666 \
            --entrypoint /opt/turingdb-venv/bin/turingdb \
            turingdbai/turingdb:latest \
            start -i 0.0.0.0 -p 6666 -demon -turing-dir /home/ubuntu/.turing
      - name: Wait for TuringDB
        run: |
          for i in $(seq 1 30); do
            curl -sf -X POST -H 'Accept: application/json' http://localhost:6670/list_avail_graphs && exit 0
            sleep 2
          done
          echo "TuringDB did not start" && exit 1
      - run: npm run test
        env:
          TURINGDB_HOST: http://localhost:6670
